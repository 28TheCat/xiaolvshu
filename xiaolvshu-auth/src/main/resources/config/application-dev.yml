# Spring 核心配置（数据源、Druid 连接池）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:13306/xiaolvshu?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Ww@12345678
    type: com.alibaba.druid.pool.DruidDataSource


  data:
    redis:
      database: 0 # Redis 数据库索引（默认为 0）
      host: 127.0.0.1 # Redis 服务器地址
      port: 16379 # Redis 服务器连接端口
      password: Ww@12345678 # Redis 服务器连接密码（默认为空）
      timeout: 5s # 读超时时间
      connect-timeout: 5s # 链接超时时间
      lettuce:
        pool:
          max-active: 200 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          min-idle: 0 # 连接池中的最小空闲连接
          max-idle: 10 # 连接池中的最大空闲连接


    # Druid 连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1 FROM DUAL
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false

      # Web 统计过滤器
      web-stat-filter:
        enabled: true

      # 监控视图 Servlet
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin

      # 过滤器配置
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

# 日志级别配置
logging:
  level:
    com.yating.xiaolvshu.auth.domain.mapper: debug  # 仅配置Mapper包的日志级别为DEBUG，合法配置

# ############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），超过此时间无访问则冻结，-1 永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录（true允许，false新登录挤掉旧登录）
  is-concurrent: true
  # 多人登录同一账号时，是否共用一个token（true共用，false每次登录新建）
  is-share: true
  # token 风格（uuid/simple-uuid/random-32/random-64/random-128/tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true